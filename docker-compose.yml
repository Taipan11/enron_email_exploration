services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: enron
      POSTGRES_USER: enron
      POSTGRES_PASSWORD: enron
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: enron
      POSTGRES_USER: enron
      POSTGRES_PASSWORD: enron
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

volumes:
  postgres_data: